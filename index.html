<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloc-notes · liens [texte]</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: linear-gradient(145deg, #f5f0eb 0%, #e8e2da 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 1.5rem;
    }
    .notepad {
      max-width: 820px;
      width: 100%;
      background: #fefcf7;
      border-radius: 2.5rem;
      box-shadow: 
        0 20px 40px rgba(0,0,0,0.15),
        0 8px 16px rgba(0,0,0,0.06),
        inset 0 1px 0 rgba(255,255,255,0.7);
      padding: 2rem 2rem 1.8rem;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,245,235,0.5);
    }
    h1 {
      font-weight: 500;
      font-size: 1.9rem;
      letter-spacing: -0.5px;
      color: #3c2e26;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.25rem;
      flex-wrap: wrap;
    }
    h1 small {
      font-size: 0.85rem;
      font-weight: 400;
      color: #8a7a6e;
      margin-left: 0.2rem;
    }
    .badge-syntax {
      background: #e7ddd4;
      padding: 0.15rem 0.9rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      color: #4f3f34;
      letter-spacing: 0.3px;
      border: 1px solid #d5c8bc;
      white-space: nowrap;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0.5rem 0 1.2rem 0;
      flex-wrap: wrap;
      gap: 0.6rem 1rem;
      border-bottom: 1px solid #e7dfd7;
      padding-bottom: 0.9rem;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: #6b5d52;
      background: #f2ece6;
      padding: 0.3rem 1rem 0.3rem 1.2rem;
      border-radius: 40px;
      letter-spacing: 0.2px;
      flex-wrap: wrap;
    }
    .status span {
      font-weight: 500;
      color: #3c2e26;
    }
    .actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .btn {
      background: #f0e9e2;
      border: none;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #3f3229;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: 0.15s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
      border: 1px solid transparent;
    }
    .btn:hover {
      background: #e3d9d0;
      transform: scale(0.97);
      border-color: #cec0b4;
    }
    .btn:active {
      background: #d5c9be;
      transform: scale(0.94);
    }
    .btn-primary {
      background: #dacfc4;
      color: #2b211b;
      font-weight: 600;
      border-color: #c8b9ab;
    }
    .btn-primary:hover {
      background: #cdbfb2;
    }
    .editor-wrapper {
      position: relative;
      border-radius: 1.8rem;
      background: #fefcf9;
      border: 1px solid #e2d7cd;
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.02);
      transition: 0.2s;
    }
    .editor-wrapper:focus-within {
      border-color: #bbaa9a;
      box-shadow: 0 0 0 4px rgba(190, 172, 158, 0.2), inset 0 2px 6px rgba(0,0,0,0.02);
      background: #ffffff;
    }
    textarea {
      width: 100%;
      height: 360px;
      padding: 1.4rem 1.6rem;
      font-size: 1rem;
      line-height: 1.7;
      border: none;
      border-radius: 1.8rem;
      background: transparent;
      color: #2f261f;
      resize: vertical;
      font-family: 'Segoe UI', 'Courier New', monospace;
      outline: none;
      letter-spacing: 0.2px;
      display: block;
    }
    .syntax-hint {
      display: flex;
      gap: 0.5rem 1.5rem;
      flex-wrap: wrap;
      padding: 0.5rem 1.6rem 0.6rem 1.6rem;
      font-size: 0.78rem;
      color: #7f6e5f;
      border-top: 1px dashed #e3d9d0;
      background: #faf7f3;
      border-radius: 0 0 1.8rem 1.8rem;
      align-items: center;
    }
    .syntax-hint code {
      background: #ece4dc;
      padding: 0.1rem 0.7rem;
      border-radius: 30px;
      font-family: 'Segoe UI', monospace;
      color: #3f3229;
      font-size: 0.75rem;
      border: 1px solid #d6c9bd;
    }
    .syntax-hint .link-indicator {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .link-indicator .arrow {
      color: #a08472;
      font-weight: 600;
    }
    .footer-notes {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.9rem;
      font-size: 0.75rem;
      color: #917f71;
      padding: 0 0.3rem;
      flex-wrap: wrap;
      gap: 0.4rem 0.8rem;
    }
    .footer-notes .key-hint {
      display: flex;
      gap: 0.3rem 1rem;
      flex-wrap: wrap;
    }
    .key-hint kbd {
      background: #ece4dc;
      padding: 0.1rem 0.7rem;
      border-radius: 30px;
      font-family: inherit;
      color: #55473d;
      font-size: 0.7rem;
      border: 1px solid #d6c9bd;
    }
    .toast {
      background: #2b221c;
      color: #f2ebe3;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
    }
    @media (max-width: 480px) {
      .notepad { padding: 1.5rem 1rem; }
      textarea { height: 260px; padding: 1rem; }
      .syntax-hint { padding: 0.5rem 1rem; flex-direction: column; align-items: flex-start; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .status { justify-content: center; }
      .actions { justify-content: center; }
    }
  </style>
</head>
<body>

<div class="notepad" role="main">
  <h1>
    📝 Bloc-notes
    <small>· liens</small>
    <span class="badge-syntax">[texte] → ancre</span>
  </h1>

  <div class="toolbar">
    <div class="status" id="statusDisplay">
      <span id="wordCount">0</span> mots · 
      <span id="charCount">0</span> caractères
      <span style="opacity:0.6; margin-left:0.2rem;">·</span>
      <span id="linkCount" style="font-weight:400;">0 lien</span>
    </div>
    <div class="actions">
      <button class="btn" id="clearBtn" title="Effacer le contenu">🗑️ Effacer</button>
      <button class="btn btn-primary" id="saveBtn">💾 Sauvegarder</button>
    </div>
  </div>

  <div class="editor-wrapper">
    <textarea id="noteArea" placeholder="Écrivez votre note ici… [titre] pointera vers la première occurrence de 'titre'"></textarea>
    <div class="syntax-hint">
      <span class="link-indicator">
        <span>🔗</span>
        <code>[mot]</code>
        <span class="arrow">→</span>
        <span>saute à la première occurrence de <strong style="font-weight:500;color:#4d3b2e;">mot</strong></span>
      </span>
      <span style="opacity:0.7; font-size:0.7rem;">(cliquez sur le lien dans le texte)</span>
    </div>
  </div>

  <div class="footer-notes">
    <div class="key-hint">
      <kbd>⌘S</kbd> <span style="color:#9b8a7b;">ou</span> <kbd>Ctrl+S</kbd>
      <span style="margin-left:0.4rem;">sauvegarde</span>
    </div>
    <div id="toastMessage" class="toast">✅ Sauvegardé</div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ----- Éléments DOM -----
    const noteArea = document.getElementById('noteArea');
    const wordCountSpan = document.getElementById('wordCount');
    const charCountSpan = document.getElementById('charCount');
    const linkCountSpan = document.getElementById('linkCount');
    const saveBtn = document.getElementById('saveBtn');
    const clearBtn = document.getElementById('clearBtn');
    const toast = document.getElementById('toastMessage');

    // ----- Clé localStorage -----
    const STORAGE_KEY = 'notepad_content';

    // ----- État -----
    let saveTimeout = null;
    let toastTimeout = null;
    let currentLinks = []; // pour stocker les positions de liens

    // ----- Utilitaires -----
    function updateStats() {
      const text = noteArea.value;
      const charCount = text.length;
      const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
      wordCountSpan.textContent = words;
      charCountSpan.textContent = charCount;

      // Compter les liens [texte] (approximatif)
      const linkMatches = text.match(/\[([^\]]+)\]/g);
      const linkCount = linkMatches ? linkMatches.length : 0;
      linkCountSpan.textContent = linkCount + (linkCount > 1 ? ' liens' : ' lien');
    }

    // ----- Sauvegarde dans localStorage -----
    function saveToLocalStorage() {
      const content = noteArea.value;
      try {
        localStorage.setItem(STORAGE_KEY, content);
        showToast('✅ Sauvegardé');
      } catch (e) {
        showToast('⚠️ Erreur de sauvegarde');
        console.warn('localStorage error:', e);
      }
    }

    // ----- Sauvegarde automatique (debounce) -----
    function scheduleAutoSave() {
      if (saveTimeout) clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => {
        saveToLocalStorage();
        saveTimeout = null;
      }, 400);
    }

    // ----- Afficher un toast -----
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      if (toastTimeout) clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
        toastTimeout = null;
      }, 1800);
    }

    // ----- Charger depuis localStorage -----
    function loadFromLocalStorage() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved !== null) {
          noteArea.value = saved;
        } else {
          noteArea.value = 'Bienvenue dans votre bloc-notes 📓\n\nExemple de lien : [introduction] va pointer vers "introduction" plus bas.\n\n[introduction]\nVoici le texte d\'introduction. Cliquez sur [introduction] pour y sauter.\n\nVous pouvez aussi utiliser [notes] pour lier vers "notes".\n\n[notes]\nContenu des notes.';
        }
      } catch (e) {
        console.warn('Impossible de lire localStorage:', e);
        noteArea.value = '⚠️ Erreur de chargement, mais vous pouvez écrire.';
      }
      updateStats();
    }

    // ----- Fonction pour traiter les liens [texte] dans la zone -----
    function processLinks() {
      const text = noteArea.value;
      // On retire les anciens liens (pour éviter les doublons)
      const wrapper = noteArea.parentElement;
      const existingLinks = wrapper.querySelectorAll('.link-anchor');
      existingLinks.forEach(el => el.remove());

      // On ne crée pas de liens si le textarea n'est pas focus ou si vide
      if (!text.trim()) return;

      // Trouver tous les motifs [texte] (non chevauchants)
      const regex = /\[([^\]]+)\]/g;
      let match;
      const linkPositions = [];

      // On collecte les positions et le texte cible
      while ((match = regex.exec(text)) !== null) {
        const targetText = match[1].trim();
        if (targetText === '') continue;
        const startIndex = match.index;
        const endIndex = startIndex + match[0].length;
        linkPositions.push({
          start: startIndex,
          end: endIndex,
          target: targetText,
          fullMatch: match[0]
        });
      }

      if (linkPositions.length === 0) return;

      // Construire le nouveau contenu avec des spans cliquables
      // On va parcourir le texte et insérer des <span> à la place des motifs
      let html = '';
      let lastIndex = 0;

      for (let link of linkPositions) {
        // Ajouter le texte avant le lien
        html += escapeHtml(text.substring(lastIndex, link.start));
        // Créer le lien span
        const displayText = link.fullMatch; // ex: "[introduction]"
        const target = link.target;
        html += `<span class="link-anchor" data-target="${escapeHtml(target)}" style="cursor:pointer; color:#8a5f4b; background:#f2ebe4; padding:0 0.1rem; border-radius:6px; font-weight:500; border-bottom:2px solid #c9b2a0; transition:0.1s;">${escapeHtml(displayText)}</span>`;
        lastIndex = link.end;
      }

      // Ajouter le reste du texte après le dernier lien
      html += escapeHtml(text.substring(lastIndex));

      // Remplacer le contenu du textarea par le HTML (mais on garde le textarea pour l'édition)
      // On ne modifie pas le textarea, on ajoute un overlay ou on utilise un conteneur ?
      // Solution : on désactive le textarea ? Non, on utilise un div superposé ?
      // Approche plus simple : on garde le textarea et on ajoute un div superposé pour l'affichage des liens.
      // Mais on veut que l'utilisateur puisse éditer le texte. 
      // On va créer un div superposé transparent qui affiche les liens, mais on laisse le textarea en dessous.
      // Pour éviter les problèmes de clics, on désactive l'interaction sur le div overlay.
      
      let overlay = wrapper.querySelector('.link-overlay');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.className = 'link-overlay';
        overlay.style.cssText = `
          position: absolute;
          top: 0; left: 0;
          width: 100%; height: 100%;
          pointer-events: none;
          padding: 1.4rem 1.6rem;
          font-size: 1rem;
          line-height: 1.7;
          font-family: 'Segoe UI', 'Courier New', monospace;
          color: transparent;
          overflow: hidden;
          border-radius: 1.8rem;
          background: transparent;
          white-space: pre-wrap;
          word-wrap: break-word;
          z-index: 2;
        `;
        wrapper.appendChild(overlay);
        // On ajoute un écouteur pour les clics sur les liens via l'overlay (pointer-events: none sur l'overlay, mais on va les remettre sur les spans)
      }

      // On met à jour le contenu de l'overlay avec les spans, mais on doit les rendre cliquables
      overlay.innerHTML = html;

      // Maintenant on rend les spans cliquables (pointer-events: auto)
      const linkSpans = overlay.querySelectorAll('.link-anchor');
      linkSpans.forEach(span => {
        span.style.pointerEvents = 'auto';
        span.addEventListener('click', function(e) {
          e.stopPropagation();
          const target = this.dataset.target;
          if (target) {
            jumpToFirstOccurrence(target);
          }
        });
        // style au survol
        span.addEventListener('mouseenter', function() {
          this.style.background = '#dccfc4';
          this.style.borderBottomColor = '#a67c64';
        });
        span.addEventListener('mouseleave', function() {
          this.style.background = '#f2ebe4';
          this.style.borderBottomColor = '#c9b2a0';
        });
      });

      // Ajuster la hauteur de l'overlay pour suivre le textarea
      overlay.style.height = noteArea.scrollHeight + 'px';
    }

    // ----- Helper pour échapper le HTML -----
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ----- Fonction pour sauter à la première occurrence du texte cible -----
    function jumpToFirstOccurrence(target) {
      const text = noteArea.value;
      // On cherche la première occurrence du texte cible (hors des motifs [])
      // On utilise indexOf sur le texte brut
      const lowerText = text.toLowerCase();
      const lowerTarget = target.toLowerCase();
      let index = lowerText.indexOf(lowerTarget);
      
      // Si on trouve l'occurrence, on sélectionne et on scroll
      if (index !== -1) {
        // On sélectionne la zone
        noteArea.focus();
        noteArea.setSelectionRange(index, index + target.length);
        // On fait défiler jusqu'à la sélection
        noteArea.scrollTop = 0; // reset
        // On calcule la position approximative
        const textBefore = text.substring(0, index);
        const lines = textBefore.split('\n');
        const lineHeight = 24; // approximatif
        const targetLine = lines.length - 1;
        const scrollPos = targetLine * lineHeight;
        noteArea.scrollTop = Math.max(0, scrollPos - 40);
        
        // Indicateur visuel
        showToast(`🔗 Sauté à "${target}"`);
      } else {
        showToast(`⚠️ "${target}" introuvable`);
      }
    }

    // ----- Gestionnaire d'événements pour mettre à jour l'overlay -----
    function updateOverlay() {
      processLinks();
    }

    // ----- Effacer le contenu -----
    function clearContent() {
      if (noteArea.value.trim() === '') return;
      if (confirm('Effacer tout le texte ? Cette action est irréversible.')) {
        noteArea.value = '';
        updateStats();
        saveToLocalStorage();
        showToast('🗑️ Note effacée');
        noteArea.focus();
        updateOverlay();
      }
    }

    // ----- Initialisation -----
    function init() {
      loadFromLocalStorage();
      // Initialiser l'overlay
      updateOverlay();
      
      // Écouteurs
      noteArea.addEventListener('input', function() {
        updateStats();
        scheduleAutoSave();
        updateOverlay();
      });

      noteArea.addEventListener('scroll', function() {
        const overlay = noteArea.parentElement.querySelector('.link-overlay');
        if (overlay) {
          overlay.scrollTop = noteArea.scrollTop;
        }
      });

      // Sauvegarde manuelle
      saveBtn.addEventListener('click', function(e) {
        e.preventDefault();
        saveToLocalStorage();
        if (saveTimeout) {
          clearTimeout(saveTimeout);
          saveTimeout = null;
        }
      });

      clearBtn.addEventListener('click', function(e) {
        e.preventDefault();
        clearContent();
      });

      // Raccourci Ctrl+S / Cmd+S
      document.addEventListener('keydown', function(e) {
        if ((e.key === 's' || e.key === 'S') && (e.ctrlKey || e.metaKey)) {
          e.preventDefault();
          saveToLocalStorage();
          if (saveTimeout) {
            clearTimeout(saveTimeout);
            saveTimeout = null;
          }
          noteArea.style.transition = 'background 0.1s';
          noteArea.style.background = '#f4ede6';
          setTimeout(() => { noteArea.style.background = ''; }, 150);
        }
      });

      // Sauvegarde avant de quitter
      window.addEventListener('beforeunload', function() {
        if (saveTimeout) {
          clearTimeout(saveTimeout);
          saveTimeout = null;
        }
        try {
          localStorage.setItem(STORAGE_KEY, noteArea.value);
        } catch (_) { /* ignore */ }
      });

      // Sauvegarde quand l'onglet devient caché
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'hidden') {
          if (saveTimeout) {
            clearTimeout(saveTimeout);
            saveTimeout = null;
          }
          try {
            localStorage.setItem(STORAGE_KEY, noteArea.value);
          } catch (_) { /* ignore */ }
        }
      });

      // Redimensionner l'overlay quand le textarea change de taille
      const resizeObserver = new ResizeObserver(() => {
        updateOverlay();
      });
      resizeObserver.observe(noteArea);

      // Mise à jour quand la fenêtre change
      window.addEventListener('resize', function() {
        updateOverlay();
      });

      // Focus initial
      noteArea.focus();
    }

    // Démarrer
    init();

  })();
</script>
</body>
</html>
